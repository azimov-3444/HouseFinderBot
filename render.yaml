services:
  - type: web
    name: house-finder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5

  - type: worker
    name: house-finder-telegram-bot
    runtime: node
    rootDir: telegram-bot
    buildCommand: npm install --strict-ssl=false
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: MONGO_URI
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
