services:
  - type: worker
    name: house-finder-telegram-bot
    runtime: node
    rootDir: telegram-bot
    buildCommand: npm install --strict-ssl=false
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: MONGO_URI
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
